<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Restablecer Contraseña — TikTok Games</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Outfit', sans-serif;
      background: #0a0a0f;
      color: #f1f5f9;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .bg {
      position: fixed; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,58,237,0.15) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 80%, rgba(6,182,212,0.1) 0%, transparent 60%),
        #0a0a0f;
    }
    .card {
      position: relative; z-index: 10;
      background: rgba(17,17,24,0.9);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 24px;
      padding: 44px 40px;
      width: 380px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.5);
      animation: card-in 0.4s cubic-bezier(.34,1.56,.64,1);
    }
    @keyframes card-in {
      from { opacity: 0; transform: scale(0.94) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo-icon {
      width: 56px; height: 56px; border-radius: 16px;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      display: inline-flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 12px;
    }
    h1 { font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .subtitle { font-size: 13px; color: #64748b; }

    .field { margin-bottom: 16px; }
    .field label { display: block; font-size: 11px; font-weight: 600; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 7px; }
    .field input {
      width: 100%;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 11px;
      padding: 12px 14px;
      color: #f1f5f9;
      font-family: 'Outfit', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus { border-color: #7c3aed; box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
    .field input::placeholder { color: #334155; }

    .btn {
      width: 100%; padding: 14px; border-radius: 12px; border: none;
      background: linear-gradient(135deg, #7c3aed, #06b6d4);
      color: #fff; font-family: 'Outfit', sans-serif;
      font-size: 15px; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s, transform 0.1s; margin-top: 4px;
    }
    .btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .msg {
      display: none; margin-top: 14px; padding: 10px 14px;
      border-radius: 10px; font-size: 13px; text-align: center;
    }
    .msg.error   { display: block; background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
    .msg.success { display: block; background: rgba(16,185,129,0.1);
      border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="bg"></div>
  <div class="card" id="form-card">
    <div class="logo">
      <div class="logo-icon">🎮</div>
      <h1>Nueva Contraseña</h1>
      <p class="subtitle">Ingresa tu nueva contraseña para continuar</p>
    </div>

    <div class="field">
      <label>Nueva contraseña</label>
      <input type="password" id="new-pwd" placeholder="Mínimo 6 caracteres" autofocus>
    </div>
    <div class="field">
      <label>Confirmar contraseña</label>
      <input type="password" id="confirm-pwd" placeholder="Repite la contraseña">
    </div>

    <button class="btn" id="btn" onclick="doReset()">Restablecer contraseña</button>
    <div class="msg" id="msg"></div>
  </div>

  <script>
    const token = new URLSearchParams(window.location.search).get('token');

    if (!token) {
      document.getElementById('msg').className = 'msg error';
      document.getElementById('msg').textContent = 'Enlace inválido. Solicita uno nuevo.';
      document.getElementById('btn').disabled = true;
    }

    document.getElementById('confirm-pwd').addEventListener('keydown', e => {
      if (e.key === 'Enter') doReset();
    });

    async function doReset() {
      const pwd     = document.getElementById('new-pwd').value.trim();
      const confirm = document.getElementById('confirm-pwd').value.trim();
      const btn     = document.getElementById('btn');
      const msg     = document.getElementById('msg');

      msg.className = 'msg';

      if (!pwd || pwd.length < 6) {
        msg.className = 'msg error';
        msg.textContent = 'La contraseña debe tener al menos 6 caracteres';
        return;
      }
      if (pwd !== confirm) {
        msg.className = 'msg error';
        msg.textContent = 'Las contraseñas no coinciden';
        return;
      }

      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> Guardando...';

      try {
        const res  = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pwd })
        });
        const data = await res.json();

        if (data.ok) {
          btn.innerHTML = '✓ Contraseña actualizada';
          btn.style.background = 'linear-gradient(135deg, #10b981, #059669)';
          msg.className = 'msg success';
          msg.textContent = '¡Listo! Ya puedes cerrar esta ventana e ingresar con tu nueva contraseña.';
        } else {
          msg.className = 'msg error';
          msg.textContent = data.message || 'Error al restablecer la contraseña';
          btn.disabled = false;
          btn.innerHTML = 'Restablecer contraseña';
        }
      } catch {
        msg.className = 'msg error';
        msg.textContent = 'Error de conexión. Inténtalo de nuevo.';
        btn.disabled = false;
        btn.innerHTML = 'Restablecer contraseña';
      }
    }
  </script>
</body>
</html>
